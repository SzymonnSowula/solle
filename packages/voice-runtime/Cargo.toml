[package]
name = "volle-voice-runtime"
version = "0.1.0"
edition = "2021"
authors = ["Volle Team"]
description = "Shared voice pipeline for Volle desktop"
rust-version = "1.78"

[dependencies]
cpal = "0.15"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.23", features = ["native-tls"] }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
log = "0.4"
anyhow = "1"
webrtc-vad = "0.4"
crossbeam-channel = "0.5"
dasp_sample = "0.11"

[dev-dependencies]
env_logger = "0.11"
