name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-worker
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-action@stable
      - name: Add clippy
        run: rustup component add clippy
      - name: Check voice-runtime
        run: cargo check --manifest-path packages/voice-runtime/Cargo.toml
      - name: Check client-desktop
        run: cargo check --manifest-path apps/client-desktop/src-tauri/Cargo.toml
      - name: Clippy voice-runtime
        run: cargo clippy --manifest-path packages/voice-runtime/Cargo.toml -- -D warnings
      - name: Clippy client-desktop
        run: cargo clippy --manifest-path apps/client-desktop/src-tauri/Cargo.toml -- -D warnings

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/client-desktop
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/client-desktop/package-lock.json
      - name: Set up Rust
        uses: dtolnay/rust-action@stable
      - name: Install frontend dependencies
        run: npm install
      - name: Install tauri-cli
        run: cargo install tauri-cli --locked
      - name: Build Tauri app
        run: cargo tauri build
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: volle-windows-msi
          path: apps/client-desktop/src-tauri/target/release/bundle/msi/*.msi
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: volle-windows-nsis
          path: apps/client-desktop/src-tauri/target/release/bundle/nsis/*.exe
